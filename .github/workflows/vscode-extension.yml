name: VS Code Extension

on:
  push:
    branches: [main]
    paths: ["editors/vscode/**"]
    tags: ["vscode-v*"]
  pull_request:
    paths: ["editors/vscode/**"]

defaults:
  run:
    working-directory: editors/vscode

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Compile
        run: npm run build

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: llmstack-vscode-vsix
          path: editors/vscode/*.vsix

  publish:
    # Publishes to OpenVSX on a `vscode-v*` tag. Requires an OVSX_TOKEN secret;
    # skipped automatically when the token is not configured.
    needs: build
    if: startsWith(github.ref, 'refs/tags/vscode-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish to OpenVSX
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: |
          if [ -z "$OVSX_TOKEN" ]; then
            echo "OVSX_TOKEN not set — skipping OpenVSX publish."
            exit 0
          fi
          npm run build
          npx ovsx publish --no-dependencies -p "$OVSX_TOKEN"

      - name: Publish to VS Marketplace
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          if [ -z "$VSCE_TOKEN" ]; then
            echo "VSCE_TOKEN not set — skipping VS Marketplace publish."
            exit 0
          fi
          npx @vscode/vsce publish --no-dependencies -p "$VSCE_TOKEN"
