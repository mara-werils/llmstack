name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. Include any error messages you saw.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. llmstack init --preset rag
        2. llmstack up
        3. curl http://localhost:8000/v1/chat/completions ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is the impact?
      options:
        - Low - cosmetic or minor inconvenience
        - Medium - feature partially broken, workaround exists
        - High - feature completely broken, no workaround
        - Critical - data loss, security issue, or crash
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of llmstack is affected?
      multiple: true
      options:
        - CLI (init, up, down, status, etc.)
        - Gateway (API proxy, auth, streaming)
        - RAG pipeline (ingest, query)
        - Cache (Redis, semantic cache)
        - Rate limiter
        - Circuit breaker
        - Observability (Prometheus, Grafana)
        - Configuration (llmstack.yaml)
        - Docker / containers
        - Fine-tuning
        - Plugins
        - Other
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: If relevant, paste your `llmstack.yaml` (redact any secrets).
      render: yaml

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Paste the output of `llmstack doctor`. If unavailable, list your OS, Python version, Docker version, and GPU.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: llmstack version
      description: Output of `llmstack --version`
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (use `llmstack logs <service>` or check the gateway output).
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I am using the latest version of llmstack
          required: false
        - label: I can reproduce this issue consistently
          required: false
