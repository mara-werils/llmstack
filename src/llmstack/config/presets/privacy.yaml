# Privacy-first preset — all local, no external providers
version: '1'

models:
  chat:
    name: llama3.2
    backend: auto
    context_length: 8192
  embeddings:
    name: nomic-embed-text
    backend: auto

services:
  vectors:
    provider: qdrant
    port: 6333
  cache:
    provider: redis
    port: 6379

providers:
  enabled: false  # No external providers

gateway:
  port: 8000
  auth: api_key
  rate_limit: 50/min
  cors: ['http://localhost:*']  # Localhost only
  request_timeout: 120

observe:
  metrics: true
  quality_tracking: true
  alert_threshold: 0.4
