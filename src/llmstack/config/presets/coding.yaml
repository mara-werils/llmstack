# Coding-focused preset — optimized for software development tasks
version: '1'

models:
  chat:
    name: deepseek-coder-v2:lite
    backend: auto
    context_length: 16384
  embeddings:
    name: nomic-embed-text
    backend: auto

services:
  vectors:
    provider: qdrant
    port: 6333
  cache:
    provider: redis
    port: 6379

providers:
  enabled: false

gateway:
  port: 8000
  auth: none
  rate_limit: 200/min
  cors: ['*']
  request_timeout: 180

observe:
  metrics: true
  quality_tracking: true
  alert_threshold: 0.3
