apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llmstack.fullname" . }}-config
  labels:
    {{- include "llmstack.labels" . | nindent 4 }}
data:
  LLMSTACK_ENV: {{ .Values.config.env | quote }}
  LLMSTACK_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  QDRANT_URL: {{ .Values.config.qdrantUrl | quote }}
  OLLAMA_URL: {{ .Values.config.ollamaUrl | quote }}
  GATEWAY_PORT: {{ .Values.config.gatewayPort | quote }}
  GATEWAY_WORKERS: {{ .Values.config.gatewayWorkers | quote }}
