apiVersion: v1
kind: ConfigMap
metadata:
  name: llmstack-config
  namespace: llmstack
  labels:
    app.kubernetes.io/name: llmstack
    app.kubernetes.io/component: gateway
data:
  LLMSTACK_ENV: "production"
  LLMSTACK_LOG_LEVEL: "info"
  REDIS_URL: "redis://redis:6379/0"
  QDRANT_URL: "http://qdrant:6333"
  OLLAMA_URL: "http://ollama:11434"
  GATEWAY_PORT: "8000"
  GATEWAY_WORKERS: "4"
