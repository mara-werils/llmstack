apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmstack-gateway
  labels:
    app: llmstack
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llmstack
      component: gateway
  template:
    metadata:
      labels:
        app: llmstack
        component: gateway
    spec:
      containers:
        - name: gateway
          image: llmstack/gateway:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: llmstack-config
            - secretRef:
                name: llmstack-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: llmstack-gateway
  labels:
    app: llmstack
spec:
  selector:
    app: llmstack
    component: gateway
  ports:
    - port: 80
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llmstack-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llmstack-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: llmstack-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: llmstack
      component: gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llmstack-config
data:
  LLMSTACK_ENV: production
  LLMSTACK_LOG_LEVEL: info
  LLMSTACK_LOG_FORMAT: json
  LLMSTACK_RATE_LIMIT: "1000/min"
  LLMSTACK_CACHE_TTL: "3600"
  LLMSTACK_CORS_ORIGINS: "*"
